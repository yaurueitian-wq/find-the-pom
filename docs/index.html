<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到薯哥！🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --primary: #ff6b6b;
      --secondary: #ffd93d;
      --accent: #6bcb77;
      --blue: #4d96ff;
      --purple: #c77dff;
      --dark: #1a1a2e;
      --card: #ffffff;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ========== SCREENS ========== */
    .screen {
      display: none;
      width: 100%;
      max-width: 900px;
      padding: 20px;
      animation: fadeIn 0.5s ease;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== START SCREEN ========== */
    .start-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 50px 40px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .game-logo {
      font-size: 80px;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .game-title {
      font-size: 2.6rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .game-title span {
      color: var(--secondary);
    }

    .game-subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 1rem;
      margin-bottom: 30px;
    }

    .rules {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px 22px;
      text-align: left;
      margin-bottom: 30px;
    }

    .rules h3 {
      color: var(--secondary);
      font-size: 1rem;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .rules li {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.92rem;
      line-height: 1.8;
      list-style: none;
      padding-left: 0;
    }

    .rules li::before {
      content: '🐾 ';
    }

    .btn-start {
      background: linear-gradient(135deg, var(--primary), #ff4757);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 50px;
      font-size: 1.3rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
    }

    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 107, 107, 0.55);
    }

    /* ========== GAME SCREEN ========== */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .level-badge {
      background: linear-gradient(135deg, var(--purple), #7b2fff);
      color: #fff;
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 4px 14px rgba(199, 125, 255, 0.4);
    }

    .score-display {
      background: linear-gradient(135deg, var(--secondary), #ffa502);
      color: #1a1a2e;
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 4px 14px rgba(255, 217, 61, 0.4);
    }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 8px 16px;
    }

    .timer-icon {
      font-size: 1rem;
    }

    .timer-bar-outer {
      width: 120px;
      height: 10px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .timer-bar-inner {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width 1s linear, background 0.5s;
    }

    .timer-text {
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      min-width: 28px;
      text-align: right;
    }

    /* Scene name */
    .scene-name {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.88rem;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* Game canvas area */
    .game-area {
      position: relative;
      width: 100%;
      max-width: 800px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: crosshair;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 3px solid rgba(255, 255, 255, 0.12);
      user-select: none;
    }

    .game-area img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    /* Click ripple */
    .ripple {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      transform: translate(-50%, -50%) scale(0);
      animation: rippleAnim 0.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    /* Found overlay flash */
    .found-flash {
      position: absolute;
      inset: 0;
      background: rgba(107, 203, 119, 0.3);
      border-radius: var(--radius);
      animation: flashAnim 0.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes flashAnim {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    /* Miss flash */
    .miss-flash {
      position: absolute;
      inset: 0;
      background: rgba(255, 71, 87, 0.2);
      border-radius: var(--radius);
      animation: flashAnim 0.4s ease-out forwards;
      pointer-events: none;
    }

    /* Dog found marker */
    .dog-marker {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid var(--secondary);
      background: rgba(255, 217, 61, 0.2);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: markerAnim 0.5s ease-out;
      box-shadow: 0 0 20px rgba(255, 217, 61, 0.6);
    }

    @keyframes markerAnim {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }

      70% {
        transform: translate(-50%, -50%) scale(1.2);
      }

      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    /* Hint dot (shown near dog when time running low) */
    .hint-dot {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 217, 61, 0.7);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 1.2s infinite;
      display: none;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0.4;
      }
    }

    /* Level clear message */
    .level-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      padding: 28px 44px;
      text-align: center;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }

    .level-msg.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .level-msg .msg-icon {
      font-size: 3rem;
    }

    .level-msg .msg-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--dark);
      margin: 8px 0 4px;
    }

    .level-msg .msg-sub {
      font-size: 1rem;
      color: #555;
    }

    /* Difficulty stars */
    .difficulty-stars {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.82rem;
      margin-bottom: 10px;
      text-align: center;
    }

    /* ========== END SCREEN ========== */
    .end-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 50px 40px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .trophy {
      font-size: 80px;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }

    .end-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
    }

    .final-score {
      font-size: 4rem;
      font-weight: 900;
      color: var(--secondary);
      text-shadow: 0 0 30px rgba(255, 217, 61, 0.5);
      margin: 18px 0;
      animation: scoreCount 0.8s ease-out;
    }

    @keyframes scoreCount {
      from {
        transform: scale(0.5);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .score-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .score-breakdown {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px 22px;
      margin-bottom: 26px;
      text-align: left;
    }

    .score-breakdown h3 {
      color: var(--secondary);
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .level-score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.88rem;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .level-score-row:last-child {
      border-bottom: none;
    }

    .level-score-row .pts {
      color: var(--accent);
      font-weight: 900;
    }

    .rank-msg {
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 26px;
    }

    .btn-restart {
      background: linear-gradient(135deg, var(--blue), #2d3dff);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 44px;
      font-size: 1.2rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 25px rgba(77, 150, 255, 0.4);
    }

    .btn-restart:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(77, 150, 255, 0.5);
    }

    /* Floating paw prints background */
    .paw-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .paw-bg span {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.06;
      animation: float linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
      }

      to {
        transform: translateY(-120px) rotate(360deg);
      }
    }

    /* progress dots */
    .level-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .level-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background 0.3s;
    }

    .level-dot.done {
      background: var(--accent);
    }

    .level-dot.current {
      background: var(--secondary);
      transform: scale(1.4);
    }

    /* Confetti particles */
    .confetti-particle {
      position: absolute;
      pointer-events: none;
      border-radius: 3px;
      animation: confettiPop 0.8s ease-out forwards;
    }

    @keyframes confettiPop {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }

      100% {
        transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1);
        opacity: 0;
      }
    }

    /* Floating score popup */
    .score-popup {
      position: absolute;
      font-family: 'Nunito', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--secondary);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 217, 61, 0.5);
      pointer-events: none;
      z-index: 20;
      animation: floatUp 1.5s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }

      15% {
        transform: translate(-50%, -70%) scale(1.3);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -200%) scale(1);
        opacity: 0;
      }
    }

    /* Success ring pulse */
    .success-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid var(--secondary);
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: ringPulse 0.8s ease-out forwards;
    }

    @keyframes ringPulse {
      0% {
        width: 0;
        height: 0;
        opacity: 1;
      }

      100% {
        width: 120px;
        height: 120px;
        opacity: 0;
      }
    }

    /* Game area celebration bounce */
    .game-area.celebrate {
      animation: celebrateBounce 0.5s ease-out;
    }

    @keyframes celebrateBounce {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(1.02);
      }

      60% {
        transform: scale(0.99);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Debug / calibration panel */
    .debug-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-family: monospace;
      cursor: pointer;
      z-index: 200;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }

    .debug-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.8);
    }

    .debug-toggle.active {
      background: rgba(0, 255, 0, 0.15);
      border-color: rgba(0, 255, 0, 0.4);
      color: #0f0;
    }


    /* Responsive */
    @media (max-width: 600px) {
      .game-title {
        font-size: 1.9rem;
      }

      .timer-bar-outer {
        width: 80px;
      }
    }
  </style>
</head>

<body>

  <!-- Floating paw prints -->
  <div class="paw-bg" id="pawBg"></div>

  <!-- ====== START SCREEN ====== -->
  <div id="startScreen" class="screen active">
    <div class="start-card">
      <div class="game-logo">🐾</div>
      <h1 class="game-title">找到<span>薯哥</span>！</h1>
      <p class="game-subtitle">在複雜的圖片中，找到藏起來的&nbsp;薯哥！</p>
      <div class="rules">
        <h3>📋 遊戲規則</h3>
        <ul>
          <li>共有 10 關，難度越來越高</li>
          <li>每關限時 60 秒</li>
          <li>時間到自動進入下一關</li>
          <li>找到&nbsp;薯哥&nbsp;得分，剩餘時間越多分越高</li>
          <li>薯哥會越藏越隱蔽，眼力要好！</li>
        </ul>
      </div>
      <button class="btn-start" id="btnStart" onclick="startGame()">開始遊戲 🐕</button>
    </div>
  </div>

  <!-- ====== GAME SCREEN ====== -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="level-badge" id="levelBadge">第 1 關</div>
      <div class="timer-wrap">
        <span class="timer-icon">⏱</span>
        <div class="timer-bar-outer">
          <div class="timer-bar-inner" id="timerBar"></div>
        </div>
        <span class="timer-text" id="timerText">60</span>
      </div>
      <div class="score-display" id="scoreDisplay">🐾 0 分</div>
    </div>

    <div class="level-dots" id="levelDots"></div>

    <div class="difficulty-stars" id="difficultyStars"></div>
    <div class="scene-name" id="sceneName"></div>

    <div class="game-area" id="gameArea" onclick="handleClick(event)">
      <img id="gameImg" src="" alt="找找看！" draggable="false" />
      <div class="hint-dot" id="hintDot"></div>
    </div>
  </div>

  <!-- ====== END SCREEN ====== -->
  <div id="endScreen" class="screen">
    <div class="end-card">
      <div class="trophy" id="trophyIcon">🏆</div>
      <h2 class="end-title">遊戲結束！</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="score-label">最終得分</div>
      <div class="rank-msg" id="rankMsg"></div>
      <div class="score-breakdown">
        <h3>📊 各關成績</h3>
        <div id="scoreRows"></div>
      </div>
      <button class="btn-restart" onclick="restartGame()">再玩一次 🔄</button>
    </div>
  </div>

  <!-- Level clear popup -->
  <div class="level-msg" id="levelMsg">
    <div class="msg-icon" id="msgIcon"></div>
    <div class="msg-title" id="msgTitle"></div>
    <div class="msg-sub" id="msgSub"></div>
  </div>

  <button class="debug-toggle" id="debugToggle" onclick="toggleDebug()">校準</button>

  <script>
    // ======================================================
    // GAME DATA — hotspot positions as percentage of image
    // x%, y% from top-left of the image
    // radius in % of the image width
    // ======================================================
    const LEVELS = [
      {
        id: 1,
        image: 'images/level1.png',
        scene: '🌳 公園裡的午後',
        difficulty: 1,
        // 白色博美在草地中間偏右
        dog: { x: 43.9, y: 75.4, r: 6 },
        hint: '小提示：草地上有一團白白的 🌿'
      },
      {
        id: 2,
        image: 'images/level2.png',
        scene: '🏠 溫馨的客廳',
        difficulty: 2,
        // 博美蜷在白色地毯中央
        dog: { x: 80.2, y: 80.6, r: 6 },
        hint: '小提示：找找白色絨毛地毯 🛋️'
      },
      {
        id: 3,
        image: 'images/level3.png',
        scene: '🧸 夢幻玩具店',
        difficulty: 3,
        // 博美在右側貨架上混在玩偶中
        dog: { x: 69.3, y: 57.6, r: 6 },
        hint: '小提示：玩具架上有毛茸茸的東西 🧸'
      },
      {
        id: 4,
        image: 'images/level4.png',
        scene: '🐱 貓咪咖啡廳',
        difficulty: 4,
        // 博美在左側地板混在貓群中
        dog: { x: 18.6, y: 84.6, r: 6 },
        hint: '小提示：那隻「貓」好像不是貓？ 🐈'
      },
      {
        id: 5,
        image: 'images/level5.png',
        scene: '🌸 繽紛花卉市場',
        difficulty: 5,
        // 博美在右下方白色花叢中
        dog: { x: 84.6, y: 84.6, r: 6 },
        hint: '小提示：白色花叢裡有驚喜 🌼'
      },
      {
        id: 6,
        image: 'images/level6.png',
        scene: '🏖️ 熱鬧的海灘',
        difficulty: 6,
        // 奶油色博美在沙灘中央偏左
        dog: { x: 64.7, y: 69.5, r: 6 },
        hint: '小提示：沙子的顏色好像跟牠有點像... 🏄'
      },
      {
        id: 7,
        image: 'images/level7.png',
        scene: '📚 古典圖書館',
        difficulty: 7,
        // 博美在二樓沙發上睡覺
        dog: { x: 75.8, y: 34.2, r: 6 },
        hint: '小提示：二樓有個毛茸茸的閱讀者 📖'
      },
      {
        id: 8,
        image: 'images/level8.png',
        scene: '🏮 夜晚夜市',
        difficulty: 8,
        // 博美在攤位前方
        dog: { x: 50.3, y: 81.9, r: 6 },
        hint: '小提示：攤販桌子底下有什麼？ 🍜'
      },
      {
        id: 9,
        image: 'images/level9.png',
        scene: '☃️ 冬日雪景',
        difficulty: 9,
        // 白色博美在雪人的右下方
        dog: { x: 74.1, y: 77.5, r: 6 },
        hint: '小提示：雪人旁邊的那一團是什麼？ ❄️'

    function playBark() {
      barkAudio.currentTime = 0;
      barkAudio.play().catch(() => { });
    }
    // ======================================================
    // BOOT
    // ======================================================
    function generatePawBg() {
      const bg = document.getElementById('pawBg');
      for (let i = 0; i < 18; i++) {
        const span = document.createElement('span');
        span.textContent = ['🐾', '🐕', '⭐', '✨'][Math.floor(Math.random() * 4)];
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDuration = (8 + Math.random() * 12) + 's';
        span.style.animationDelay = (Math.random() * 10) + 's';
        span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        bg.appendChild(span);
      }
    }
    generatePawBg();

    // ======================================================
    // GAME FLOW
    // ======================================================
    function startGame() {
      currentLevel = 0;
      score = 0;
      levelScores = [];
      gameOver = false;
      showScreen('gameScreen');
      buildLevelDots();
      loadLevel(0);
    }

    function restartGame() {
      startGame();
    }

    function loadLevel(idx) {
      if (idx >= LEVELS.length) {
        endGame();
        return;
      }
      levelDone = false;
      hintShown = false;
      const lvl = LEVELS[idx];

      // Header
      document.getElementById('levelBadge').textContent = `第 ${lvl.id} 關`;
      document.getElementById('scoreDisplay').textContent = `🐾 ${score} 分`;
      document.getElementById('sceneName').textContent = lvl.scene;

      // Difficulty stars
      const stars = '⭐'.repeat(lvl.difficulty) + '☆'.repeat(10 - lvl.difficulty);
      document.getElementById('difficultyStars').textContent = `難度: ${stars}`;

      // Image
      document.getElementById('gameImg').src = lvl.image;

      // Level dots
      updateLevelDots(idx);

      // Cleanup old markers/hints
      document.querySelectorAll('.dog-marker, .ripple, .found-flash, .miss-flash').forEach(e => e.remove());
      document.getElementById('hintDot').style.display = 'none';

      // Timer
      clearInterval(timerInterval);
      timeLeft = TOTAL_TIME;
      updateTimerUI();
      timerInterval = setInterval(tickTimer, 1000);
    }

    function tickTimer() {
      if (levelDone) return;
      timeLeft--;
      updateTimerUI();

      // Show hint at 20 seconds remaining
      if (timeLeft === 20 && !hintShown) {
        showHint();
      }

      if (timeLeft <= 0) {
        timeOut();
      }
    }

    function updateTimerUI() {
      const pct = (timeLeft / TOTAL_TIME) * 100;
      const bar = document.getElementById('timerBar');
      bar.style.width = pct + '%';

      // Color gradient urgent
      if (pct > 50) {
        bar.style.background = 'linear-gradient(90deg, #6bcb77, #4d96ff)';
      } else if (pct > 25) {
        bar.style.background = 'linear-gradient(90deg, #ffd93d, #ff9f43)';
      } else {
        bar.style.background = 'linear-gradient(90deg, #ff6b6b, #ff4757)';
      }

      document.getElementById('timerText').textContent = timeLeft;
    }

    function showHint() {
      hintShown = true;
      const lvl = LEVELS[currentLevel];
      const dot = document.getElementById('hintDot');
      dot.style.left = lvl.dog.x + '%';
      dot.style.top = lvl.dog.y + '%';
      dot.style.display = 'block';
      // Briefly show hint
      setTimeout(() => { dot.style.display = 'block'; }, 0);
    }

    function timeOut() {
      clearInterval(timerInterval);
      levelDone = true;
      levelScores.push({ level: currentLevel + 1, pts: 0, found: false });

      showLevelMsg('⏰', '時間到！', `薯哥躲過去了... 下一關！`);

      setTimeout(() => {
        hideLevelMsg();
        currentLevel++;
        loadLevel(currentLevel);
      }, 2000);
    }

    // ======================================================
    // CLICK HANDLING
    // ======================================================
    function handleClick(e) {
      if (levelDone) return;
      const area = document.getElementById('gameArea');
      const img = document.getElementById('gameImg');
      const areaRect = area.getBoundingClientRect();
      const imgRect = img.getBoundingClientRect();
      // 用 img rect 計算座標，排除 border 偏移
      const clickX = ((e.clientX - imgRect.left) / imgRect.width) * 100;
      const clickY = ((e.clientY - imgRect.top) / imgRect.height) * 100;

      // Ripple（相對於 area 定位）
      addRipple(e.clientX - areaRect.left, e.clientY - areaRect.top);

      const lvl = LEVELS[currentLevel];
      const dist = Math.sqrt(Math.pow(clickX - lvl.dog.x, 2) + Math.pow(clickY - lvl.dog.y, 2));

      if (dist <= lvl.dog.r) {
        foundDog(clickX, clickY);
      } else {
        missClick();
      }
    }

    // ======================================================
    // SUCCESS EFFECTS
    // ======================================================
    function spawnConfetti(x, y) {
      const area = document.getElementById('gameArea');
      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c77dff', '#ff9f43'];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-particle';
        const angle = (Math.PI * 2 * i) / 30 + (Math.random() - 0.5) * 0.5;
        const dist = 50 + Math.random() * 100;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 30;
        p.style.cssText = `
      left:${x}%;top:${y}%;
      width:${4 + Math.random() * 6}px;
      height:${4 + Math.random() * 6}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --tx:${tx}px;--ty:${ty}px;
      --rot:${Math.random() * 720 - 360}deg;
      animation-duration:${(0.6 + Math.random() * 0.6).toFixed(2)}s;
    `;
        area.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }

    function showScorePopup(x, y, pts) {
      const area = document.getElementById('gameArea');
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = `+${pts}`;
      popup.style.left = x + '%';
      popup.style.top = y + '%';
      area.appendChild(popup);
      setTimeout(() => popup.remove(), 1600);
    }

    function showSuccessRings(x, y) {
      const area = document.getElementById('gameArea');
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const ring = document.createElement('div');
          ring.className = 'success-ring';
          ring.style.left = x + '%';
          ring.style.top = y + '%';
          area.appendChild(ring);
          setTimeout(() => ring.remove(), 1000);
        }, i * 150);
      }
    }

    function foundDog(cx, cy) {
      levelDone = true;
      clearInterval(timerInterval);

      const pts = Math.round(100 + timeLeft * 8);
      score += pts;
      levelScores.push({ level: currentLevel + 1, pts, found: true });

      document.getElementById('scoreDisplay').textContent = `🐾 ${score} 分`;
      document.getElementById('hintDot').style.display = 'none';

      // 用點擊位置（cx, cy）顯示所有回饋，確保特效跟滑鼠一致
      const area = document.getElementById('gameArea');
      const marker = document.createElement('div');
      marker.className = 'dog-marker';
      marker.style.left = cx + '%';
      marker.style.top = cy + '%';
      area.appendChild(marker);

      // 成功特效：汪汪音效 + 紙花 + 分數飄出 + 光環擴散 + 畫面彈跳
      playBark();
      spawnConfetti(cx, cy);
      showScorePopup(cx, cy, pts);
      showSuccessRings(cx, cy);
      area.classList.add('celebrate');
      setTimeout(() => area.classList.remove('celebrate'), 600);

      // Flash
      const flash = document.createElement('div');
      flash.className = 'found-flash';
      area.appendChild(flash);

      showLevelMsg('🎉', `找到啦！+${pts} 分`, `剩餘 ${timeLeft} 秒 × 8 + 100 基礎分`);

      setTimeout(() => {
        hideLevelMsg();
        currentLevel++;
        loadLevel(currentLevel);
      }, 2200);
    }

    function missClick() {
      const area = document.getElementById('gameArea');
      const flash = document.createElement('div');
      flash.className = 'miss-flash';
      area.appendChild(flash);
      setTimeout(() => flash.remove(), 500);
    }

    function addRipple(x, y) {
      const area = document.getElementById('gameArea');
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = x + 'px';
      r.style.top = y + 'px';
      area.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }

    // ======================================================
    // LEVEL MESSAGE
    // ======================================================
    function showLevelMsg(icon, title, sub) {
      document.getElementById('msgIcon').textContent = icon;
      document.getElementById('msgTitle').textContent = title;
      document.getElementById('msgSub').textContent = sub;
      document.getElementById('levelMsg').classList.add('show');
    }

    function hideLevelMsg() {
      document.getElementById('levelMsg').classList.remove('show');
    }

    // ======================================================
    // LEVEL DOTS
    // ======================================================
    function buildLevelDots() {
      const container = document.getElementById('levelDots');
      container.innerHTML = '';
      LEVELS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'level-dot';
        d.id = `dot-${i}`;
        container.appendChild(d);
      });
    }

    function updateLevelDots(idx) {
      LEVELS.forEach((_, i) => {
        const d = document.getElementById(`dot-${i}`);
        if (!d) return;
        d.className = 'level-dot';
        if (i < idx) d.classList.add('done');
        else if (i === idx) d.classList.add('current');
      });
    }

    // ======================================================
    // END GAME
    // ======================================================
    function endGame() {
      clearInterval(timerInterval);
      showScreen('endScreen');

      document.getElementById('finalScore').textContent = score;

      // Rank
      let rank, trophy;
      if (score >= 1500) { rank = '🏆 薯哥偵探大師！你的眼力無敵！'; trophy = '🏆'; }
      else if (score >= 1000) { rank = '🥈 薯哥搜尋高手，表現超棒！'; trophy = '🥈'; }
      else if (score >= 500) { rank = '🥉 薯哥發現者，繼續加油！'; trophy = '🥉'; }
      else { rank = '🐾 薯哥藏起來了，下次再試！'; trophy = '🐾'; }

      document.getElementById('trophyIcon').textContent = trophy;
      document.getElementById('rankMsg').textContent = rank;

      // Score breakdown
      const rows = document.getElementById('scoreRows');
      rows.innerHTML = '';
      LEVELS.forEach((lvl, i) => {
        const ls = levelScores[i] || { pts: 0, found: false };
        const row = document.createElement('div');
        row.className = 'level-score-row';
        row.innerHTML = `
      <span>${ls.found ? '✅' : '❌'} 第 ${lvl.id} 關「${lvl.scene}」</span>
      <span class="pts">${ls.pts > 0 ? '+' + ls.pts : '0'} 分</span>
    `;
        rows.appendChild(row);
      });
    }

    // ======================================================
    // SCREEN SWITCHER
    // ======================================================
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ======================================================
    // 校準模式（點擊右下角「校準」按鈕切換）
    // 開啟後點擊圖片會顯示座標，不觸發遊戲邏輯
    // ======================================================
    let debugMode = false;

    function toggleDebug() {
      debugMode = !debugMode;
      const btn = document.getElementById('debugToggle');
      btn.classList.toggle('active', debugMode);
      btn.textContent = debugMode ? '校準 ON' : '校準';
    }

    // 攔截 handleClick，校準模式下只顯示座標不判定
    const origHandleClick = handleClick;
    handleClick = function (e) {
      const img = document.getElementById('gameImg');
      const imgRect = img.getBoundingClientRect();
      const x = ((e.clientX - imgRect.left) / imgRect.width * 100).toFixed(1);
      const y = ((e.clientY - imgRect.top) / imgRect.height * 100).toFixed(1);

      if (debugMode) {
        const lvl = LEVELS[currentLevel];
        const dist = Math.sqrt(Math.pow(x - lvl.dog.x, 2) + Math.pow(y - lvl.dog.y, 2));
        const hit = dist <= lvl.dog.r;

        // 在畫面上顯示座標
        const area = document.getElementById('gameArea');
        const label = document.createElement('div');
        label.style.cssText = `
      position:absolute; left:${x}%; top:${y}%;
      transform:translate(-50%,-150%);
      background:rgba(0,0,0,0.9); color:${hit ? '#0f0' : '#ff6b6b'};
      padding:6px 12px; border-radius:8px;
      font-size:13px; font-family:monospace;
      pointer-events:none; z-index:50;
      white-space:nowrap; border:1px solid ${hit ? '#0f0' : '#ff6b6b'};
    `;
        label.textContent = `x:${x} y:${y} | dist:${dist.toFixed(1)} ${hit ? 'HIT' : 'MISS'}`;
        area.appendChild(label);
        setTimeout(() => label.remove(), 4000);

        // 校準模式下也顯示目標區域圓圈
        const target = document.createElement('div');
        const rPx = lvl.dog.r / 100 * imgRect.width;
        target.style.cssText = `
      position:absolute; left:${lvl.dog.x}%; top:${lvl.dog.y}%;
      width:${rPx * 2}px; height:${rPx * 2}px;
      border:2px dashed rgba(0,255,0,0.5);
      border-radius:50%; transform:translate(-50%,-50%);
      pointer-events:none; z-index:49;
    `;
        area.appendChild(target);
        setTimeout(() => target.remove(), 4000);

        return; // 不觸發遊戲邏輯
      }

      origHandleClick(e);
    };
  </script>
</body>
